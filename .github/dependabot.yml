version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "build" # Conventional Commit type -> no version bump
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
