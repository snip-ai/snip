name: Release

# release-please maintains a "release PR" (version bump + CHANGELOG from
# Conventional Commits). When that PR merges it creates the GitHub release + tag,
# and — in the SAME run — we build and attach the cross-platform binaries.
# (Building here avoids the GitHub limitation where a GITHUB_TOKEN-created tag
# does not trigger separate workflows.) The release PR also bumps the plugin
# manifest version (release-please `extra-files`), so plugins/snip/.claude-plugin/
# plugin.json reports the right version (e.g. in `/snip-status`); the SessionStart
# update-check tracks the latest release directly, independent of that manifest.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # A PAT (if set) makes the release PR trigger CI — a GITHUB_TOKEN-created
          # PR does not, so its required status checks would never run under branch
          # protection. Falls back to GITHUB_TOKEN when the secret is absent.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "../../../snip-${{ matrix.target }}.tar.gz" snip
          cd ../../../
          shasum -a 256 "snip-${{ matrix.target }}.tar.gz" > "snip-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/snip.exe -DestinationPath "snip-${{ matrix.target }}.zip"
          (Get-FileHash "snip-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  snip-${{ matrix.target }}.zip" | Out-File -Encoding ascii "snip-${{ matrix.target }}.zip.sha256"

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            snip-${{ matrix.target }}.${{ matrix.archive }}
            snip-${{ matrix.target }}.${{ matrix.archive }}.sha256
